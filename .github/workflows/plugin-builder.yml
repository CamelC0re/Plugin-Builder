name: Air-Gapped Plugin Compiler Sandbox
on:
  repository_dispatch:
    types: [build_plugin]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    name: Compile and Mirror Plugin from Secure Cache

    steps:
      # 1. Clean workspace setup and download the verified snapshot directly from your R2 bucket
      # Expected client_payload keys: plugin_id, commit_hash, source_zip_url
      - name: Download Source Zip from Cloudflare R2
        run: |
          echo "Fetching secure source snapshot for plugin: ${{ github.event.client_payload.plugin_id }}"
          curl -L -H "Authorization: Bearer ${{ secrets.HUB_CALLBACK_TOKEN }}" -o plugin_source.zip "${{ github.event.client_payload.source_zip_url }}"

      # 2. Extract the clean source package into the root environment runner directory
      - name: Extract Source Zip Bundle
        run: |
          unzip plugin_source.zip -d temp_dir
          # Move contents of the inner root directory (including hidden files) up one level
          shopt -s dotglob
          ROOT_DIR=$(ls temp_dir)
          mv temp_dir/$ROOT_DIR/* .
          shopt -u dotglob
          rm -rf temp_dir plugin_source.zip
          echo "Extraction complete. Current directory structure:"
          ls -la

      # 3. Establish the Node.js environment (Locked to v22 as required by the package engine rules)
      - name: Setup Node.js (v22)
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # 4. Initialize Corepack to match and execute the plugin's exact Yarn 4 lockfile constraints
      - name: Enable Corepack & Activate Yarn Modern
        run: |
          corepack enable
          corepack prepare yarn@4.9.1 --activate

      # 5. Fetch dependencies using strict lockfile mapping checks to prevent runtime injection attacks
      # If the node tree differs from the committed manifest lock lines, execution safely breaks
      - name: Install Dependencies
        run: yarn install --immutable

      # 6. Execute the custom esbuild/bundling script layout to compile distribution binaries
      - name: Run Plugin Compilation
        run: yarn build

      # 7. Mirror the fresh source files directly to your read-only public auditing portal
      # This preserves community open access (GPLv3 compliance) if the developer nukes their personal repo
      - name: Checkout Monorepo Vault Mirror
        uses: actions/checkout@v4
        with:
          repository: 'CamelC0re/plugin-vault'
          token: ${{ secrets.VAULT_PUSH_TOKEN }} # Fine-grained org token with write clearance on plugin-vault
          path: 'plugin-vault'

      - name: Sync Source Code to Vault Directory
        run: |
          PLUGIN_DIR="plugin-vault/plugins/${{ github.event.client_payload.plugin_name }}"
          METADATA_FILE="$PLUGIN_DIR/CAMELCORE_METADATA.json"
          
          # 1. Stash existing metadata if it exists
          if [ -f "$METADATA_FILE" ]; then
            cp "$METADATA_FILE" /tmp/OLD_METADATA.json
          else
            rm -f /tmp/OLD_METADATA.json
          fi

          # 2. Extract versions and licenses from the plugin's package.json
          PLUGIN_VERSION=$(jq -r '.version // "1.0.0"' package.json 2>/dev/null || echo "1.0.0")
          PLUGIN_LICENSE=$(jq -r '.license // "Unknown"' package.json 2>/dev/null || echo "Unknown")

          # 3. Evict previous folder history to clear artifacts removed by the author in this revision
          rm -rf "$PLUGIN_DIR"
          mkdir -p "$PLUGIN_DIR"
          
          # 4. Sync clean files over into the corresponding sub-folder structure
          rsync -av . "$PLUGIN_DIR/" \
            --exclude 'node_modules' \
            --exclude '.git' \
            --exclude '.yarn' \
            --exclude 'plugin-vault' \
            --exclude 'dist' \
            --exclude '.pnp.*'

          # 5. Generate Event Block
          EVENT_JSON=$(jq -n \
            --arg version "$PLUGIN_VERSION" \
            --arg maintainer "${{ github.event.client_payload.author }}" \
            --arg upstream "${{ github.event.client_payload.github_url }}" \
            --arg hash "${{ github.event.client_payload.commit_hash }}" \
            --arg approved_by "${{ github.event.client_payload.approved_by }}" \
            --arg timestamp "$(date -u +'%Y-%m-%dT%H:%M:%SZ')" \
            '{
              version: $version,
              event: "update",
              maintainer: $maintainer,
              upstream_repository: $upstream,
              verified_commit_hash: $hash,
              approved_by: $approved_by,
              timestamp: $timestamp
            }')

          # 6. Reconstruct metadata
          if [ -f /tmp/OLD_METADATA.json ]; then
            PREV_MAINTAINER=$(jq -r '.current_maintainer' /tmp/OLD_METADATA.json)
            if [ "$PREV_MAINTAINER" != "${{ github.event.client_payload.author }}" ]; then
              EVENT_JSON=$(echo "$EVENT_JSON" | jq '.event = "project_adoption" | .notes = "Plugin ownership transferred or adopted."')
            fi
            
            jq --arg maintainer "${{ github.event.client_payload.author }}" \
               --arg license "$PLUGIN_LICENSE" \
               --argjson event "$EVENT_JSON" \
               '.current_maintainer = $maintainer | .license = $license | .release_history = ([$event] + .release_history)' \
               /tmp/OLD_METADATA.json > "$METADATA_FILE"
          else
            jq -n \
              --arg id "${{ github.event.client_payload.plugin_name }}" \
              --arg license "$PLUGIN_LICENSE" \
              --arg creator "${{ github.event.client_payload.author }}" \
              --arg maintainer "${{ github.event.client_payload.author }}" \
              --argjson event "$EVENT_JSON" \
              '{
                plugin_id: $id,
                license: $license,
                original_creator: $creator,
                current_maintainer: $maintainer,
                succession_status: "active",
                release_history: [$event]
              }' > "$METADATA_FILE"
          fi

      - name: Commit and Push Code to Public Vault Mirror
        run: |
          cd plugin-vault
          git config user.name "CamelCore Bot"
          git config user.email "bot@evilquest.wiki"
          git add .
          git commit -m "Mirror: ${{ github.event.client_payload.plugin_id }} @ ${{ github.event.client_payload.commit_hash }}" || echo "No files modified."
          git push origin main

      # 8. Deploy the final compiled distribution asset out to production storage channels
      - name: Synchronize Compiled Assets to Cloudflare R2 Bucket
        uses: jakejarvis/s3-sync-action@master
        with:
          args: --acl public-read
        env:
          AWS_S3_BUCKET: 'camelcore-plugins'
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_S3_ENDPOINT: ${{ secrets.R2_ENDPOINT_URL }} # Format: https://<account_id>.r2.cloudflarestorage.com
          SOURCE_DIR: 'dist/' # Syncs output binaries (e.g., plugin.js)
          DEST_DIR: '${{ github.event.client_payload.plugin_id }}'

      # 9. Ping your Hono core edge framework to instantly shift the client's live production endpoint status to active
      - name: Execute Hono API Registry Callback
        run: |
          curl -X POST ${{ secrets.API_CALLBACK_URL }} \
            -H "Authorization: Bearer ${{ secrets.HUB_CALLBACK_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "plugin_id": "${{ github.event.client_payload.plugin_id }}",
              "commit_hash": "${{ github.event.client_payload.commit_hash }}",
              "status": "published"
            }'